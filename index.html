<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="description" content="OPUSDEV — explore a tiny stylized planet in your browser." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@200;300&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="app"></div>

<div id="loader">
  <div class="start-screen">
    <h1 class="start-title">OPUSDEV</h1>
    <div class="start-divider" aria-hidden="true">
      <div class="start-progress" id="startProgress"></div>
    </div>
    <p class="start-status" id="loadStatus">Loading world...</p>
    <button id="begin" class="start-play" type="button">PLAY NOW</button>
  </div>
</div>

<footer id="siteFooter" class="site-footer" aria-label="Links">
  <a class="site-link site-link--x" data-link="twitter" href="https://x.com/0pusdev" target="_blank" rel="noopener noreferrer" title="Follow Opus Dev on X">
    <svg class="site-link__icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    <span>dev this game</span>
  </a>
  <a class="site-link site-link--gh" data-link="github" href="https://github.com/rapkuryer/opusdev-docs" target="_blank" rel="noopener noreferrer" title="Game documentation on GitHub">
    <svg class="site-link__icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
    <span>docs</span>
  </a>
</footer>

<div id="hud">
  <div id="deliveries" class="card">📦 Deliveries <span class="pill"><span id="dcount">0</span>/5</span></div>
  <div id="weather" class="card" style="position:absolute;top:62px;left:16px;padding:8px 14px;font-weight:800;font-size:14px;display:flex;gap:6px;align-items:center"><span id="wIcon">☀️</span><span id="wName">Clear</span></div>
  <div id="compass" class="card"><span class="arrow">🧭</span></div>
  <div id="prompt" class="card"><kbd>E</kbd><span id="promptText">Talk</span></div>

  <div id="dialog" class="card">
    <div class="name" id="dlgName">NPC</div>
    <div class="line" id="dlgLine">...</div>
    <div class="next">SPACE / TAP → NEXT</div>
  </div>

  <div id="outfit" class="card">
    <h3>👚 Wardrobe</h3>
    <div class="slot"><label>Skin</label><div class="swatches" data-slot="skin"></div></div>
    <div class="slot"><label>Top</label><div class="swatches" data-slot="top"></div></div>
    <div class="slot"><label>Bottom</label><div class="swatches" data-slot="bottom"></div></div>
    <div class="slot"><label>Hat</label><div class="swatches" data-slot="hat"></div></div>
  </div>

  <div id="rcorner">
    <button class="rbtn" id="btnOutfit">👚</button>
    <button class="rbtn" id="btnEmoji">💩</button>
    <div id="emojiRing"></div>
  </div>
  <div class="hint" id="mobileHint" style="display:none">tap-drag left = move · right = look</div>
</div>

<div id="stick"><div></div></div>

<div id="vig"></div>
<div id="grain"></div>

<div id="flash">🎉</div>

<div id="win">
  <div class="env">🏆</div>
  <h1>Nice work, courier!</h1>
  <p>All 5 parcels delivered across the little planet.</p>
  <button onclick="location.reload()">Play again</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "three-mesh-bvh": "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.9.0/src/index.js",
    "three-mesh-bvh/": "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.9.0/src/"
  }
}
</script>

<script type="module" src="js/main.js"></script>
</body>
</html>
